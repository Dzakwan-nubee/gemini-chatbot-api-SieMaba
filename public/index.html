<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sie MABA - Kating Kesayanganmu</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <div class="top-bar">
    <button id="dark-mode-toggle" class="dark-mode-toggle">🌙 Dark Mode</button>
  </div>
  <div class="container">
    <div class="chat-header">
      <h1>Sie Maba</h1>
      <p class="status-bot">● Online (Siap Membimbing)</p>
    </div>
    <div id="chat-box" class="chat-box">
      <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-avatar">🎓</div>
        <h2>Halo, Maba! Selamat Datang!</h2>
        <p>Aku <strong>Sie Maba</strong>, kating kesayanganmu yang siap bantu kamu adaptasi di kampus. Mau tanya apa
          hari ini?</p>

        <div class="quick-suggestions">
          <button type="button" class="suggestion-chip">💡 Tips maba biar ga kaget</button>
          <button type="button" class="suggestion-chip">📚 Cara ngatur jadwal kuliah</button>
          <button type="button" class="suggestion-chip">🤝 Cara milih organisasi kampus</button>
          <button type="button" class="suggestion-chip">💬 Tips nge-chat dosen yang sopan</button>
        </div>
      </div>
    </div>
    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Tanyakan seputar kehidupan kampus..." autocomplete="off"
        required />
      <button type="submit">Send</button>
    </form>
  </div>
  <script src="script.js"></script>
</body>

</html>
